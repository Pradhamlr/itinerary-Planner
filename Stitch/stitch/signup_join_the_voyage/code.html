<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Join Voyager | The Digital Concierge</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<!-- Icons -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-primary-fixed-variant": "#264778",
              "outline": "#74777f",
              "secondary-fixed": "#5af8fb",
              "on-surface-variant": "#43474e",
              "tertiary-fixed-dim": "#59dad1",
              "surface-container-low": "#f3f4f5",
              "on-primary-fixed": "#001b3d",
              "secondary-fixed-dim": "#2ddbde",
              "primary-fixed-dim": "#a9c7ff",
              "on-error-container": "#93000a",
              "tertiary-fixed": "#79f6ed",
              "on-secondary-fixed-variant": "#004f51",
              "surface-variant": "#e1e3e4",
              "surface-container-high": "#e7e8e9",
              "primary-fixed": "#d6e3ff",
              "on-tertiary-fixed-variant": "#00504c",
              "tertiary": "#000606",
              "on-secondary-fixed": "#002020",
              "inverse-primary": "#a9c7ff",
              "background": "#f8f9fa",
              "on-error": "#ffffff",
              "error-container": "#ffdad6",
              "primary": "#000514",
              "primary-container": "#001e43",
              "on-primary-container": "#6887bc",
              "surface-container": "#edeeef",
              "tertiary-container": "#002321",
              "inverse-surface": "#2e3132",
              "on-primary": "#ffffff",
              "secondary-container": "#56f5f8",
              "error": "#ba1a1a",
              "secondary": "#00696b",
              "surface": "#f8f9fa",
              "surface-container-lowest": "#ffffff",
              "on-secondary": "#ffffff",
              "inverse-on-surface": "#f0f1f2",
              "outline-variant": "#c4c6cf",
              "on-tertiary-container": "#00968f",
              "on-tertiary": "#ffffff",
              "surface-bright": "#f8f9fa",
              "on-tertiary-fixed": "#00201e",
              "surface-container-highest": "#e1e3e4",
              "on-background": "#191c1d",
              "surface-tint": "#405f91",
              "surface-dim": "#d9dadb",
              "on-secondary-container": "#006e70",
              "on-surface": "#191c1d"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .editorial-gradient {
            background: linear-gradient(135deg, #000514 0%, #001e43 100%);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface antialiased overflow-hidden">
<main class="min-h-screen grid grid-cols-1 lg:grid-cols-2">
<!-- Left Side: Visual Narrative (Split Screen) -->
<section class="relative hidden lg:flex items-end p-16 overflow-hidden">
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover" data-alt="Majestic snow-capped mountain peaks rising above a soft blanket of morning mist with a crisp blue sky and cool natural lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCowOyZqbkdDeSAtk5bC35tQrg9RCx2tunAkugBpkdk0L0My4EHrCdbk98enL_rGx3ZTRosyqBMmtxMYJ0xJFKJxI8F6AFQ4wK1JGM3LV-bjexTHV-Hc8m9VKDf7ESlzsN66TxihqDodFhIVcs4d19BctTZFkEcIRnSDckhWvvJbkIpXKNfLQuBGxZPkMPYAPjgTFGtdYeARzWCE5RoOcH7LBklJQ0m6hhNP5_g2auOosl0YM8Ih1OmXXm55Zp5WItkBwSjFenYcos"/>
<div class="absolute inset-0 bg-gradient-to-t from-primary/80 via-transparent to-transparent"></div>
</div>
<div class="relative z-10 max-w-lg">
<div class="mb-8">
<span class="text-secondary-fixed font-headline font-bold tracking-widest text-sm uppercase">Curated Journeys</span>
<h1 class="text-white font-headline text-5xl font-extrabold tracking-tighter mt-2 leading-tight">
                        Your global itinerary, <br/>refined.
                    </h1>
</div>
<div class="flex gap-4 items-center">
<div class="w-12 h-[1px] bg-secondary-fixed/50"></div>
<p class="text-primary-fixed-dim font-medium tracking-wide">Voyager Digital Concierge</p>
</div>
</div>
</section>
<!-- Right Side: Interaction Canvas -->
<section class="flex items-center justify-center p-8 md:p-16 lg:p-24 bg-surface overflow-y-auto">
<div class="w-full max-w-md">
<!-- Brand Anchor -->
<div class="mb-12">
<div class="flex items-center gap-2 mb-8">
<span class="material-symbols-outlined text-secondary text-3xl" style="font-variation-settings: 'FILL' 1;">explore</span>
<span class="text-xl font-bold tracking-tighter text-slate-900">Voyager</span>
</div>
<h2 class="font-headline text-3xl font-bold text-on-surface tracking-tight">Create your account</h2>
<p class="text-on-surface-variant mt-2">Join our exclusive community of world travelers.</p>
</div>
<!-- Signup Form -->
<form class="space-y-6">
<div class="space-y-5">
<!-- Full Name -->
<div class="space-y-2">
<label class="block font-label text-sm font-semibold text-on-surface-variant ml-1" for="name">Full Name</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg group-focus-within:text-secondary transition-colors">person</span>
</div>
<input class="block w-full pl-11 pr-4 py-3.5 bg-surface-container-low border-none rounded-xl text-on-surface placeholder:text-outline focus:ring-2 focus:ring-secondary/20 focus:bg-surface-container-lowest transition-all" id="name" placeholder="John Doe" type="text"/>
</div>
</div>
<!-- Email -->
<div class="space-y-2">
<label class="block font-label text-sm font-semibold text-on-surface-variant ml-1" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg group-focus-within:text-secondary transition-colors">mail</span>
</div>
<input class="block w-full pl-11 pr-4 py-3.5 bg-surface-container-low border-none rounded-xl text-on-surface placeholder:text-outline focus:ring-2 focus:ring-secondary/20 focus:bg-surface-container-lowest transition-all" id="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Password -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="space-y-2">
<label class="block font-label text-sm font-semibold text-on-surface-variant ml-1" for="password">Password</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg group-focus-within:text-secondary transition-colors">lock</span>
</div>
<input class="block w-full pl-11 pr-4 py-3.5 bg-surface-container-low border-none rounded-xl text-on-surface placeholder:text-outline focus:ring-2 focus:ring-secondary/20 focus:bg-surface-container-lowest transition-all" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="space-y-2">
<label class="block font-label text-sm font-semibold text-on-surface-variant ml-1" for="confirm_password">Confirm Password</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg group-focus-within:text-secondary transition-colors">shield</span>
</div>
<input class="block w-full pl-11 pr-4 py-3.5 bg-surface-container-low border-none rounded-xl text-on-surface placeholder:text-outline focus:ring-2 focus:ring-secondary/20 focus:bg-surface-container-lowest transition-all" id="confirm_password" placeholder="••••••••" type="password"/>
</div>
</div>
</div>
</div>
<!-- Terms & Conditions -->
<div class="flex items-start gap-3 px-1">
<div class="flex items-center h-5">
<input class="h-4 w-4 rounded border-outline-variant text-secondary focus:ring-secondary transition-all cursor-pointer" id="terms" name="terms" type="checkbox"/>
</div>
<label class="text-sm text-on-surface-variant leading-tight" for="terms">
                            I agree to the <a class="text-secondary font-medium hover:underline" href="#">Terms &amp; Conditions</a> and <a class="text-secondary font-medium hover:underline" href="#">Privacy Policy</a>.
                        </label>
</div>
<!-- CTA -->
<button class="w-full editorial-gradient text-white font-headline font-bold py-4 px-6 rounded-full shadow-lg shadow-primary/20 hover:shadow-xl hover:shadow-primary/30 active:scale-[0.98] transition-all duration-300" type="submit">
                        Join Voyager
                    </button>
</form>
<!-- Footer Link -->
<div class="mt-8 text-center">
<p class="text-on-surface-variant text-sm">
                        Already have an account? 
                        <a class="text-secondary font-bold hover:text-on-secondary-container transition-colors ml-1" href="#">Log in</a>
</p>
</div>
<!-- Footer Info -->
<footer class="mt-20 flex flex-wrap justify-center gap-6">
<span class="text-[10px] text-outline font-medium tracking-widest uppercase">Global Support</span>
<span class="text-[10px] text-outline font-medium tracking-widest uppercase">Partner Program</span>
<span class="text-[10px] text-outline font-medium tracking-widest uppercase">© 2024 Voyager Digital</span>
</footer>
</div>
</section>
</main>
<!-- Suppressing Shared Navbars as per "The Destination Rule" for Transactional flows -->
</body></html>
